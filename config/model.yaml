grid_search:
  module: sklearn.model_selection
  class: GridSearchCV
  params:
    cv: 3
    verbose: 1
    n_jobs: -1

model_selection:

  model_0:
    module: sklearn.ensemble
    class: RandomForestClassifier

    params:
      random_state: 42

    search_param_grid:
      n_estimators: [100, 200]
      max_depth: [5, 10]

  model_1:
    module: sklearn.tree
    class: DecisionTreeClassifier

    params:
      random_state: 42

    search_param_grid:
      max_depth: [5, 10, 15]

  model_2:
    module: xgboost
    class: XGBClassifier

    params:
      eval_metric: logloss
      random_state: 42
      use_label_encoder: false

    search_param_grid:
      n_estimators: [100]
      max_depth: [4, 6]
      learning_rate: [0.1]